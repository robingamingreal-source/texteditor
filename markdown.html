<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Write</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Write in X-Write</h1>
    <p><b>Markdown Editing!</b></p>
    <div id="editorContainer">
        <textarea id="textArea" rows="20" cols="80" placeholder="Type Markdown here..."></textarea>
        <div id="preview"></div>
    </div>
    <br>
    <button onclick="saveText()">Save Text</button>
    <button onclick="clearText()">Clear Text</button>
    <button onclick="loadText()">Load Text</button>
    <input type="range" id="fontSizeSlider" min="10" max="36" value="16" oninput="updateFontSize()"></input>
    <br>
    <script>
        function updateFontSize() {
            const fontSize = document.getElementById('fontSizeSlider').value;
            document.getElementById('textArea').style.fontSize = fontSize + 'px';
        }
    </script>
    <br>
    <script>
        const textarea = document.getElementById('textArea');
        const preview = document.getElementById('preview');

        function renderMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/^###### (.*)$/gm, '<h6>$1</h6>')
                .replace(/^##### (.*)$/gm, '<h5>$1</h5>')
                .replace(/^#### (.*)$/gm, '<h4>$1</h4>')
                .replace(/^### (.*)$/gm, '<h3>$1</h3>')
                .replace(/^## (.*)$/gm, '<h2>$1</h2>')
                .replace(/^# (.*)$/gm, '<h1>$1</h1>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/^\* (.*)$/gm, '<li>$1</li>')
                .replace(/^\- (.*)$/gm, '<li>$1</li>')
                .replace(/^\+ (.*)$/gm, '<li>$1</li>');

            html = html.replace(/((?:<li>.*<\/li>\s*)+)/g, match => {
                return '<ul>' + match.trim().replace(/\s*\n\s*/g, '') + '</ul>';
            });
            html = html.replace(/\n{2,}/g, '</p><p>');
            html = '<p>' + html + '</p>';
            html = html.replace(/<p><\/p>/g, '');
            html = html.replace(/<p>(<h[1-6]>.*?<\/h[1-6]>)<\/p>/g, '$1');
            html = html.replace(/<p>(<ul>.*?<\/ul>)<\/p>/g, '$1');
            return html;
        }


        function saveText() {
            const text = textarea.value;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_text.md';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearText() {
            textarea.value = '';
        }

        function loadText() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.txt,.md,text/plain';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    textarea.value = e.target.result;
                    updatePreview();
                };
                reader.readAsText(file);
            };
            input.click();
        }

        textarea.addEventListener('input', updatePreview);
        document.addEventListener('keydown', event => {
            if ((event.ctrlKey || event.metaKey) && !event.shiftKey) {
                const key = event.key.toLowerCase();
                if (key === 's') {
                    event.preventDefault();
                    saveText();
                } else if (key === 'l') {
                    event.preventDefault();
                    loadText();
                } else if (key === 'k') {
                    event.preventDefault();
                    clearText();
                }
            }
        });

        updatePreview();
    </script>
<hr>
<button onclick="window.location.href='index.html'">Back to Home</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Write</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Edit in X-Write</h1>
    <p><b>Edit Images</b></p>
    <br>
    <button onclick="saveImg()">Save Image</button>
    <button onclick="document.getElementById('imageContainer').src = ''">Clear Image</button>
    <button onclick="loadImg()">Load Image</button>
    <br>
    <img id="imageContainer" src="" alt="Your Image Will Appear Here" style="max-width: 100%; height: auto;">
    <script>
        function saveImg() {
            const img = document.getElementById('imageContainer');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            const url = canvas.toDataURL('image/png');
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my_image.png';
            a.click();
        }

        function loadImg() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('imageContainer').src = e.target.result;
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }
    </script>
<hr>
<button onclick="window.location.href='index.html'">Back to Home</button>
</body>
</html>
